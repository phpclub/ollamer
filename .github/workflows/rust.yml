name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build ollamer (web)
        working-directory: web
        run: cargo build --verbose

      - name: Build ollamerctl
        working-directory: ollamerctl
        run: cargo build --verbose
